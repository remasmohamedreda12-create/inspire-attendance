<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور - INSPIRE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%239333ea' width='100' height='100' rx='15'/><text x='50' y='65' font-size='55' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>✓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Almarai:wght@300;400;700&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Almarai', 'Cairo', 'Inter', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a0014 0%, #1a0033 50%, #0f001a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    background-attachment: fixed;
  }

  .card {
    background: rgba(15, 8, 30, 0.85);
    border-radius: 32px;
    padding: 40px 30px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 30px 60px rgba(147, 51, 234, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    text-align: center;
    border: 1px solid rgba(147, 51, 234, 0.25);
    backdrop-filter: blur(15px);
    animation: slideUp 0.6s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .brand-logo {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #b78cf0 0%, #e0b3ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  .brand-icon {
    font-size: 24px;
    color: #9333ea;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .logo {
    font-size: 64px;
    margin-bottom: 18px;
    color: #b78cf0;
    display: block;
    animation: fadeInDown 0.8s ease-out 0.2s both;
  }

  @keyframes fadeInDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .session-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(147, 51, 234, 0.15);
    color: #c084fc;
    font-size: 11px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 28px;
    margin-bottom: 28px;
    border: 1.5px solid rgba(147, 51, 234, 0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
  }

  .session-badge:hover {
    background: rgba(147, 51, 234, 0.25);
    border-color: rgba(147, 51, 234, 0.55);
  }

  .session-badge i {
    margin-right: 8px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #e0b3ff 0%, #b78cf0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 16px;
    color: #b8a8d0;
    margin-bottom: 36px;
    line-height: 1.8;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .subtitle i {
    margin-right: 4px;
  }

  .input-group {
    margin-bottom: 28px;
    text-align: right;
    animation: fadeInUp 0.8s ease-out 0.3s both;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #a882d8;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  input {
    width: 100%;
    height: 60px;
    border: 2px solid rgba(147, 51, 234, 0.25);
    border-radius: 16px;
    padding: 0 20px;
    font-size: 18px;
    font-family: 'Poppins', monospace;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    color: #e0b3ff;
    outline: none;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    direction: ltr;
    background: rgba(147, 51, 234, 0.08);
    font-weight: 600;
  }

  input:focus {
    border-color: #9333ea;
    background: rgba(147, 51, 234, 0.18);
    box-shadow: 0 0 30px rgba(147, 51, 234, 0.25), inset 0 0 10px rgba(147, 51, 234, 0.1);
    transform: scale(1.01);
  }

  input::placeholder {
    color: #8a6fb8;
    letter-spacing: 1px;
  }

  button {
    width: 100%;
    height: 62px;
    background: linear-gradient(135deg, #9333ea 0%, #b78cf0 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    box-shadow: 0 12px 32px rgba(147, 51, 234, 0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'Almarai', 'Cairo', sans-serif;
    animation: fadeInUp 0.8s ease-out 0.4s both;
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(147, 51, 234, 0.4);
  }

  button:active {
    transform: scale(0.98);
  }

  button:disabled {
    background: #555;
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.6;
  }

  button i {
    margin-right: 8px;
    font-size: 18px;
  }

  .result {
    display: none;
    padding: 28px;
    border-radius: 20px;
    margin-top: 16px;
    backdrop-filter: blur(15px);
    animation: slideDown 0.4s ease-out;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .result.success {
    background: rgba(52, 168, 83, 0.12);
    border: 1.5px solid rgba(52, 168, 83, 0.4);
    display: block;
  }

  .result.error {
    background: rgba(234, 67, 53, 0.12);
    border: 1.5px solid rgba(234, 67, 53, 0.4);
    display: block;
  }

  .result.warn {
    background: rgba(251, 188, 4, 0.12);
    border: 1.5px solid rgba(251, 188, 4, 0.4);
    display: block;
  }

  .result-icon {
    font-size: 48px;
    margin-bottom: 14px;
  }

  .result.success .result-icon {
    color: #34a853;
    animation: pulse 0.5s ease-out;
  }

  .result.error .result-icon {
    color: #ea4335;
  }

  .result.warn .result-icon {
    color: #fbbc04;
  }

  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-name {
    font-size: 20px;
    font-weight: 700;
    color: #e0b3ff;
    margin-bottom: 8px;
    font-family: 'Almarai', 'Cairo', sans-serif;
  }

  .result-msg {
    font-size: 15px;
    color: #b8a8d0;
    font-weight: 300;
    line-height: 1.6;
  }

  .loading {
    display: none;
    color: #b78cf0;
    font-size: 14px;
    margin: 14px 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .loading i {
    margin-left: 8px;
  }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: #8a7fa8;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .footer i {
    margin-right: 6px;
    color: #9333ea;
  }

  /* ===== RESPONSIVE DESIGN ===== */
  @media (max-width: 768px) {
    body {
      padding: 12px;
    }

    .card {
      padding: 35px 25px;
      border-radius: 28px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      margin-bottom: 32px;
    }

    button {
      height: 56px;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .result {
      padding: 24px;
    }

    .result-icon {
      font-size: 44px;
      margin-bottom: 12px;
    }

    .result-name {
      font-size: 18px;
    }

    .result-msg {
      font-size: 14px;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 10px;
      min-height: 100vh;
    }

    .card {
      padding: 30px 20px;
      border-radius: 24px;
    }

    .brand {
      margin-bottom: 18px;
    }

    .brand-logo {
      font-size: 18px;
    }

    .brand-icon {
      font-size: 24px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .session-badge {
      font-size: 10px;
      padding: 8px 18px;
      margin-bottom: 24px;
    }

    label {
      font-size: 11px;
      margin-bottom: 10px;
    }

    input {
      height: 54px;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 0 16px;
    }

    button {
      height: 54px;
      font-size: 14px;
      gap: 8px;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    button i {
      font-size: 16px;
      margin-right: 6px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .result {
      padding: 20px;
      border-radius: 16px;
      margin-top: 12px;
    }

    .result-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .result-name {
      font-size: 17px;
      margin-bottom: 6px;
    }

    .result-msg {
      font-size: 13px;
    }

    .loading {
      font-size: 12px;
      margin: 10px 0;
    }

    .footer {
      margin-top: 24px;
      font-size: 9px;
    }
  }

  @media (max-width: 360px) {
    .card {
      padding: 25px 18px;
    }

    .logo {
      font-size: 44px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 22px;
    }

    .subtitle {
      font-size: 13px;
      margin-bottom: 24px;
    }

    input {
      height: 50px;
      font-size: 15px;
    }

    button {
      height: 50px;
      font-size: 13px;
    }
  }

</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-star"></i></div>
    <div class="brand-logo">INSPIRE</div>
  </div>
  
  <div class="logo"><i class="fas fa-clipboard-check"></i></div>
  
  <div class="session-badge" id="sessionBadge"><i class="fas fa-circle" style="font-size: 8px;"></i>السيشن 1</div>
  
  <h1>تسجيل الحضور</h1>
  
  <p class="subtitle">ادخل الـ ID الخاص بك<br>وسيتم تسجيل حضورك تلقائياً <i class="fas fa-check" style="color: #34a853;"></i></p>

  <div class="input-group">
    <label><i class="fas fa-key"></i> معرّفك الشخصي</label>
    <input type="text" id="idInput" placeholder="مثال: QFU9Q" maxlength="10" autocomplete="off" autocapitalize="characters" />
  </div>

  <button id="submitBtn" onclick="submitAttendance()"><i class="fas fa-check-circle"></i>تأكيد الحضور</button>

  <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> جاري المعالجة...</div>

  <div class="result" id="result">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-msg" id="resultMsg"></div>
  </div>

  <div class="footer"><i class="fas fa-sparkles"></i>INSPIRE — نظام الحضور الذكي</div>
</div>

<script>
  // ===== عنوان API النسبي للتشغيل على نفس السيرفر =====
  const SCRIPT_URL = '/api/register';
  // في حال تم نشر المشروع على استضافة Node.js، لا تحتاج إلى تغيير هذا الرابط.
  // =============================================================

  // بيجيب رقم السيشن من الرابط ?session=1
  const urlParams = new URLSearchParams(window.location.search);
  const session = parseInt(urlParams.get('session')) || 1;

  document.getElementById('sessionBadge').innerHTML = '<i class="fas fa-circle" style="font-size: 8px;"></i>السيشن ' + session;
  document.title = 'تسجيل الحضور - INSPIRE';

  document.getElementById('idInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitAttendance();
  });

  async function submitAttendance() {
    const id = document.getElementById('idInput').value.trim().toUpperCase();
    if (!id) {
      showResult('error', '<i class="fas fa-circle-exclamation"></i>', '', 'يرجى إدخال معرفك الشخصي');
      return;
    }

    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    btn.disabled = true;
    loading.style.display = 'block';
    document.getElementById('result').style.display = 'none';

    try {
      const res = await fetch(SCRIPT_URL + '?action=register&id=' + encodeURIComponent(id) + '&session=' + session);
      const data = await res.json();

      if (data.success) {
        const time = data.time ? new Date(data.time).toLocaleTimeString('ar-EG') : '';
        const msg = time ? `تم التسجيل الساعة ${time} ✨` : 'تم تسجيل حضورك بنجاح ✨';
        showResult('success', '<i class="fas fa-check-circle"></i>', data.name, msg);
        document.getElementById('idInput').value = '';
        // إضافة تأخير قبل مسح الرسالة
        setTimeout(() => {
          document.getElementById('result').style.display = 'none';
        }, 3000);
      } else if (data.already) {
        showResult('warn', '<i class="fas fa-info-circle"></i>', data.name, 'تم تسجيل حضورك من قبل في هذه الجلسة');
      } else {
        showResult('error', '<i class="fas fa-times-circle"></i>', '', data.message || 'معرف غير صحيح');
      }
    } catch (err) {
      console.error('Error:', err);
      showResult('error', '<i class="fas fa-wifi-slash"></i>', '', 'حدثت مشكلة في الاتصال، حاول مجدداً');
    }

    btn.disabled = false;
    loading.style.display = 'none';
  }

  function showResult(type, icon, name, msg) {
    const el = document.getElementById('result');
    el.className = 'result ' + type;
    document.getElementById('resultIcon').innerHTML = icon;
    document.getElementById('resultName').textContent = name;
    document.getElementById('resultMsg').textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
